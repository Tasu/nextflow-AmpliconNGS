# Nextflow NGS Amplicon Analysis Pipeline - Configuration Template
# 
# Configure this file with paths specific to your environment before running the pipeline.
# Paths can be absolute or relative to the working directory where nextflow is executed.

# --- Input/Output Paths ---
sample_sheet: "samplesheet/samplesheet_test_generated.csv"
outdir: "results"

# --- Database Paths (REQUIRED) ---
# Update these to point to your local or remote databases
kraken2_db: "/path/to/kraken2_db"
blast_db_dir: "/path/to/blast_db"
tax_db_dir: "/path/to/taxonomy_db"

# --- Resource Limits ---
# Adjust to match your system capabilities
max_cpus: 64
max_memory: "256.GB"
max_time: "24.h"

# --- Analysis Parameters ---
# target_taxid: taxonomy ID for filtering (e.g., 7711 for Chordata)
target_taxid: "7711"
filter_action: "remove"
max_reads: 10000
blast_db_name: "nt"
blast_type: "blastn"

# --- Container and Script Paths (REQUIRED) ---
# Update to match your setup after building the Singularity container
# as_container_path can be absolute or relative path to the built .sif container
as_container_path: "sif/amplicon_sorter_v2.sif"

# as_script_path should point to the amplicon_sorter.py script location
as_script_path: "helperScript/amplicon_sorter.py"

# --- Container Maintenance Configuration ---
# Preflight checks for container image availability
container_preflight_check: true
container_preflight_strict: false
container_preflight_timeout_ms: 8000
container_preflight_suggest_tags: true
container_preflight_check_docker: true
container_registry_index_url: "https://depot.galaxyproject.org/singularity/"
container_suggestion_limit: 5
preflight_only: false

# --- Optional: Container Image Overrides ---
# Uncomment and modify to override default container URLs from nextflow.config
